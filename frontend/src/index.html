<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>App</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
  <app-root></app-root>
  <!-- Colossus feedback widget (host-agnostic; ships with every scaffolded app).
       deploymentId + public ingest token are substituted at build/deploy time; the icon is
       gated live by the Widget Mode toggle in Colossus (no redeploy). Works on any host
       (cluster nginx OR off-cluster Caddy/Exoscale); self-deduplicates with edge injection. -->
  <script>window.__COLOSSUS_FEEDBACK__={d:"__COLOSSUS_DEPLOYMENT_ID__",token:"__COLOSSUS_FEEDBACK_TOKEN__"};</script>
  <script src="https://colossus.athenconsult.com/ingest/v1/loader.js" defer></script>
</body>
</html>
